name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: npm ci
      - run: npm --prefix app ci
      - name: provision Chromium for the complete judge gate
        run: npm --prefix app exec -- playwright install --with-deps chromium
      - name: complete judge gate
        run: npm run judge-demo

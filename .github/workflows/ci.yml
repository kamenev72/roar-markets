name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: typecheck + build
        run: npm run build
      - name: tests (vitest)
        run: npm test
      - name: clean-room gate (no proprietary vocabulary / secrets)
        run: bash scripts/check_cleanroom.sh
